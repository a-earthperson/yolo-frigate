[[package]]
name = "yolo-frigate"
version = "0.2.0"
source = { editable = "." }
dependencies = [
    { name = "fastapi" },
    { name = "numpy" },
    { name = "opencv-python-headless" },
    { name = "pydantic" },
    { name = "python-multipart" },
    { name = "pyyaml" },
    { name = "uvicorn", extra = ["standard"] },
]

[package.optional-dependencies]
onnx-gpu = [
    { name = "onnx", version = "1.19.0", source = { registry = "https://pypi.org/simple" }, marker = "python_full_version >= '3.13' and sys_platform == 'linux'" },
    { name = "onnx", version = "1.21.0", source = { registry = "https://pypi.org/simple" }, marker = "python_full_version < '3.13' and sys_platform == 'linux'" },
    { name = "onnxruntime-gpu", marker = "sys_platform == 'linux'" },
    { name = "onnxslim", marker = "sys_platform == 'linux'" },
    { name = "ultralytics", marker = "sys_platform == 'linux'" },
]
openvino = [
    { name = "openvino" },
    { name = "ultralytics", marker = "sys_platform == 'linux'" },
]
tensorrt = [
    { name = "onnx", version = "1.19.0", source = { registry = "https://pypi.org/simple" }, marker = "python_full_version >= '3.13' and sys_platform == 'linux'" },
    { name = "onnx", version = "1.21.0", source = { registry = "https://pypi.org/simple" }, marker = "python_full_version < '3.13' and sys_platform == 'linux'" },
    { name = "onnxruntime-gpu", marker = "sys_platform == 'linux'" },
    { name = "onnxslim", marker = "sys_platform == 'linux'" },
    { name = "ultralytics", marker = "sys_platform == 'linux'" },
]
tflite = [
    { name = "tensorflow-cpu", version = "2.18.1", source = { registry = "https://pypi.org/simple" }, marker = "python_full_version >= '3.13' and sys_platform == 'linux'" },
    { name = "tensorflow-cpu", version = "2.21.0", source = { registry = "https://pypi.org/simple" }, marker = "python_full_version < '3.13' and sys_platform == 'linux'" },
    { name = "tflite-runtime" },
    { name = "ultralytics", marker = "sys_platform == 'linux'" },
]

[package.dev-dependencies]
dev = [
    { name = "black" },
    { name = "httpx" },
    { name = "pytest" },
    { name = "pytest-cov" },
    { name = "ruff" },
]

[package.metadata]
requires-dist = [
    { name = "fastapi" },
    { name = "numpy", specifier = ">=1.23.2,<2" },
    { name = "onnx", marker = "sys_platform == 'linux' and extra == 'onnx-gpu'", specifier = ">=1.12.0,<2.0.0" },
    { name = "onnx", marker = "sys_platform == 'linux' and extra == 'tensorrt'", specifier = ">=1.12.0,<2.0.0" },
    { name = "onnxruntime-gpu", marker = "sys_platform == 'linux' and extra == 'onnx-gpu'" },
    { name = "onnxruntime-gpu", marker = "sys_platform == 'linux' and extra == 'tensorrt'" },
    { name = "onnxslim", marker = "sys_platform == 'linux' and extra == 'onnx-gpu'", specifier = ">=0.1.71" },
    { name = "onnxslim", marker = "sys_platform == 'linux' and extra == 'tensorrt'", specifier = ">=0.1.71" },
    { name = "opencv-python-headless", specifier = ">=4.11.0,<4.12" },
    { name = "openvino", marker = "extra == 'openvino'" },
    { name = "pydantic", specifier = ">=2" },
    { name = "python-multipart" },
    { name = "pyyaml" },
    { name = "tensorflow-cpu", marker = "sys_platform == 'linux' and extra == 'tflite'" },
    { name = "tflite-runtime", marker = "extra == 'tflite'", specifier = "==2.14.0" },
    { name = "ultralytics", marker = "sys_platform == 'linux' and extra == 'onnx-gpu'" },
    { name = "ultralytics", marker = "sys_platform == 'linux' and extra == 'openvino'" },
    { name = "ultralytics", marker = "sys_platform == 'linux' and extra == 'tensorrt'" },
    { name = "ultralytics", marker = "sys_platform == 'linux' and extra == 'tflite'" },
    { name = "uvicorn", extras = ["standard"] },
]
provides-extras = ["tensorrt", "tflite", "openvino", "onnx-gpu"]

[package.metadata.requires-dev]
dev = [
    { name = "black" },
    { name = "httpx" },
    { name = "pytest" },
    { name = "pytest-cov" },
    { name = "ruff" },
]
