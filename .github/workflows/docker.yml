name: Docker

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: nvidia-trt.Dockerfile
            image_tag: nvidia-trt
          - dockerfile: intel-gpu.Dockerfile
            image_tag: intel-gpu
          - dockerfile: coral-tpu.Dockerfile
            image_tag: coral-tpu
          - dockerfile: onnx-gpu.Dockerfile
            image_tag: onnx-gpu
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t "yolo-frigate:ci-${{ matrix.image_tag }}" -f "${{ matrix.dockerfile }}" .
